<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>The River Run</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f4c5c;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:15px 40px;
border-bottom:2px solid #20c9c9;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-weight:bold;
}

button{
background:#20c9c9;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

.section{
padding:60px 20px;
max-width:1100px;
margin:auto;
}

.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:#0b3b45;
padding:25px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.product{
background:#0b3b45;
border-radius:10px;
overflow:hidden;
}

.product img{
width:100%;
height:200px;
object-fit:cover;
}

.product-body{
padding:10px;
text-align:center;
}

.product-layout{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.product-gallery img{
width:100%;
border-radius:10px;
}

.price-box{
font-size:22px;
margin:15px 0;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
background:#08313a;
border:1px solid #20c9c9;
color:white;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>

<h2>The River Run</h2>

<nav>

<a href="#" onclick="show('home')">Home</a>

<a href="#" onclick="show('categories')">Fish</a>

<a href="#" onclick="showCart()">Cart (<span id="cartCount">0</span>)</a>

<a href="#" onclick="show('track')">Track</a>

</nav>

<button onclick="show('categories')">Order Fish</button>

</header>


<section id="home" class="section">

<h1>Fresh River & Sea Fish Delivered</h1>

<p>Collected directly from fishermen across Bangladesh.</p>

</section>


<section id="categories" class="section hidden">

<h2>Fish Categories</h2>

<div class="categories">

<div class="card" onclick="loadCategory('river')">River Fish</div>

<div class="card" onclick="loadCategory('sea')">Sea Fish</div>

<div class="card" onclick="loadCategory('shrimp')">Shrimp</div>

<div class="card" onclick="loadCategory('beel')">Beel Fish</div>

<div class="card" onclick="loadCategory('hilsa')">Hilsa</div>

</div>

</section>


<section id="products" class="section hidden">

<h2 id="productTitle"></h2>

<div class="products" id="productList"></div>

</section>


<section id="productPage" class="section hidden">

<div class="product-layout">

<div class="product-gallery">

<img id="mainImage">

</div>


<div>

<h2 id="fishName"></h2>

<p>Select Size Range</p>

<select id="sizeRange" onchange="loadWeightOptions()">

<option value="">Select Range</option>

<option data-price="600">2-3 KG</option>

<option data-price="800">3-5 KG</option>

<option data-price="1000">5+ KG</option>

</select>


<p>Select Exact Weight</p>

<select id="weightSelect" onchange="calculatePrice()"></select>

<div class="price-box" id="priceDisplay"></div>

<button onclick="addSelectedFish()">Add To Cart</button>

</div>

</div>

</section>


<section id="cart" class="section hidden">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3 id="cartTotal"></h3>

<button onclick="show('checkout')">Checkout</button>

</section>


<section id="checkout" class="section hidden">

<h2>Checkout</h2>

<input placeholder="Name">

<input placeholder="Phone">

<input placeholder="Address">


<select id="locationSelect" onchange="updateDelivery()">

<option value="120">Dhaka Delivery 120</option>

<option value="500">Outside Dhaka Delivery 500</option>

</select>

<button onclick="confirmOrder()">Confirm Order</button>

</section>


<section id="track" class="section hidden">

<h2>Track Order</h2>

<input id="trackInput" placeholder="Enter Order ID">

<button onclick="trackOrder()">Track</button>

<div id="trackResult"></div>

</section>


<script>

const fish={

river:["rui","katla","boal","aar","chatna"],

sea:["rupchanda","coral","pomfret"],

shrimp:["golda","bagda","horina"],

beel:["shol","koi","shing","taki"],

hilsa:["hilsa"]

}


let cart=[]

let selectedFish=null

let selectedPrice=0

let selectedWeight=0


function show(id){

document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

}


function loadCategory(cat){

show("products")

let list=document.getElementById("productList")

list.innerHTML=""

document.getElementById("productTitle").innerText=cat+" Fish"


fish[cat].forEach(name=>{

let img="images/"+name+".jpg"

let div=document.createElement("div")

div.className="product"


div.innerHTML=`

<img src="${img}">

<div class="product-body">

<h3>${name}</h3>

<button onclick="openFish('${name}','${img}')">View Fish</button>

</div>

`

list.appendChild(div)

})

}


function openFish(name,img){

selectedFish=name

document.getElementById("mainImage").src=img

document.getElementById("fishName").innerText=name

show("productPage")

}


function loadWeightOptions(){

let select=document.getElementById("weightSelect")

select.innerHTML=""

let range=document.getElementById("sizeRange")

selectedPrice=parseInt(range.options[range.selectedIndex].dataset.price)

let weights=[2,2.5,3,3.5,4,4.5,5]


weights.forEach(w=>{

let opt=document.createElement("option")

opt.value=w

opt.text=w+" KG"

select.appendChild(opt)

})

}


function calculatePrice(){

let weight=parseFloat(document.getElementById("weightSelect").value)

selectedWeight=weight

let total=weight*selectedPrice

document.getElementById("priceDisplay").innerText="Total Price: ৳"+total

}


function addSelectedFish(){

let total=selectedWeight*selectedPrice

cart.push({name:selectedFish,kg:selectedWeight,price:total})

document.getElementById("cartCount").innerText=cart.length

}


function showCart(){

show("cart")

let items=document.getElementById("cartItems")

items.innerHTML=""

let total=0


cart.forEach(i=>{

items.innerHTML+=`<p>${i.name} (${i.kg}kg) - ৳${i.price}</p>`

total+=i.price

})

document.getElementById("cartTotal").innerText="Subtotal: ৳"+total

}


function updateDelivery(){

let delivery=parseInt(document.getElementById("locationSelect").value)

}


function generateOrderID(){

return "RR-"+Math.floor(Math.random()*100000)

}


function confirmOrder(){

let id=generateOrderID()

alert("Order placed! ID: "+id)

cart=[]

document.getElementById("cartCount").innerText=0

show("home")

}


function trackOrder(){

let id=document.getElementById("trackInput").value

document.getElementById("trackResult").innerHTML="Status: Processing"

}

</script>

</body>
</html>
